<!doctype html>
<html lang="ar" dir="rtl">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Online Exam</title>
  <style>
    :root{ --bg0:#070912; --bg1:#0b1020; --stroke:#1a2b55; --text:#e9efff; --muted:#a8b3d9; --good:#22c55e; --bad:#ef4444; --glow1:#6ee7ff; --glow2:#a78bfa; --glow3:#22c55e; --glow4:#fb7185; }
    *{box-sizing:border-box}
    body{ margin:0; font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial; color:var(--text); background: radial-gradient(1200px 600px at 80% -10%, rgba(167,139,250,.22), transparent 60%), radial-gradient(1000px 500px at 10% 0%, rgba(110,231,255,.18), transparent 55%), radial-gradient(900px 500px at 50% 120%, rgba(34,197,94,.12), transparent 60%), linear-gradient(180deg, var(--bg0), var(--bg1)); min-height:100vh; overflow-x:hidden; }
    header{ position:sticky; top:0; z-index:50; backdrop-filter: blur(10px); background: linear-gradient(180deg, rgba(7,9,18,.85), rgba(7,9,18,.35)); border-bottom:1px solid rgba(26,43,85,.6); }
    .headin{ max-width:1100px;margin:0 auto; padding:14px 14px; display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
    .brand{display:flex; align-items:center; gap:12px;}
    
    .premium-logo { position: relative; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; border-radius: 50%; background: linear-gradient(135deg, #16203a, #0b1020); box-shadow: 0 5px 15px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.05); }
    .premium-logo::before, .premium-logo::after { content: ''; position: absolute; inset: -2px; border-radius: 50%; background: conic-gradient(from 0deg, var(--glow1), var(--glow2), var(--glow3), var(--glow1)); z-index: -1; animation: spin 4s linear infinite; }
    .premium-logo::after { filter: blur(8px); opacity: 0.8; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .premium-logo svg { width: 22px; height: 22px; filter: drop-shadow(0 0 6px rgba(110,231,255,0.8)); }

    h1{margin:0;font-size:18px;letter-spacing:.2px}
    .sub{margin:0;color:var(--muted);font-size:12px}
    
    .pillbar{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
    .pill{ padding:10px 12px; border-radius:999px; border:1px solid rgba(26,43,85,.9); background: rgba(15,23,48,.55); box-shadow: inset 0 0 0 1px rgba(110,231,255,.06); font-size:12px; color:var(--muted); display:flex; gap:8px; align-items:center; }
    .pill b{color:var(--text);font-weight:900}

    .wrap{max-width:800px;margin:40px auto;padding:18px 14px 24px;}
    
    .card{ background: linear-gradient(180deg, rgba(15,23,48,.72), rgba(15,23,48,.45)); border:1px solid rgba(26,43,85,.85); border-radius:22px; padding:24px; box-shadow: 0 15px 40px rgba(0,0,0,.4), inset 0 0 0 1px rgba(110,231,255,.05); position:relative; overflow:hidden; animation: slideIn 0.4s ease forwards;}
    @keyframes slideIn { from{ opacity:0; transform:translateY(20px) scale(0.98); } to{ opacity:1; transform:translateY(0) scale(1); } }
    .card:before{ content:""; position:absolute; inset:-2px; background: radial-gradient(700px 180px at 20% 0%, rgba(110,231,255,.12), transparent 60%); pointer-events:none; }
    
    .timer-wrap { width: 100%; height: 8px; background: rgba(26,43,85,.55); border-radius: 10px; overflow: hidden; margin-bottom: 25px; box-shadow: inset 0 0 5px rgba(0,0,0,0.5);}
    .timer-bar { height: 100%; width: 100%; background: linear-gradient(90deg, var(--glow1), var(--glow3)); transition: width 1s linear, background 0.3s; }
    .timer-bar.danger { background: linear-gradient(90deg, var(--glow4), var(--bad)); }

    .qtop{display:flex; align-items:flex-start; justify-content:space-between; gap:15px; margin-bottom:15px;}
    .qno{ min-width:50px;height:40px;border-radius:12px; background: linear-gradient(135deg, rgba(26,43,85,.8), rgba(15,23,48,.9)); border:1px solid rgba(110,231,255,.3); display:grid; place-items:center; color:var(--text); font-weight:1000; box-shadow: 0 0 15px rgba(110,231,255,.15); flex:0 0 auto; font-size: 16px;}
    .qtext{ margin:0; font-size:18px; line-height:1.7; color:var(--text); direction:ltr; text-align:left; unicode-bidi: plaintext; flex: 1; font-weight: 500;}
    
    .medical-tooltip { position: relative; cursor: help; color: var(--glow1); border-bottom: 2px dashed var(--glow1); font-weight: 900; padding-bottom: 2px; }
    .medical-tooltip::after { content: attr(data-meaning); position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%); background: rgba(15,23,48,.95); border: 1px solid var(--glow1); color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 14px; white-space: nowrap; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-weight: 700;}
    .medical-tooltip:hover::after { opacity: 1; bottom: 150%; }

    .opts{display:grid; gap:12px; margin-top:20px}
    .opt{ border-radius:16px; border:1px solid rgba(26,43,85,.85); background: rgba(7,9,18,.35); padding:16px; cursor:pointer; display:flex; gap:12px; align-items:center; transition: all .15s ease; user-select:none; }
    .opt:hover{transform: translateY(-2px); border-color: rgba(110,231,255,.40); background: rgba(26,43,85,.4);}
    .badge{ width:32px;height:32px;border-radius:10px; background: rgba(26,43,85,.6); border:1px solid rgba(26,43,85,.9); display:grid;place-items:center; font-weight:1000; color:var(--muted); flex:0 0 auto; }
    .opt .txt{color:var(--text); font-size:15px; line-height:1.55; direction:ltr; text-align:left;}
    .opt.correct{ border-color: rgba(34,197,94,.6); background: rgba(34,197,94,.15); box-shadow: 0 0 20px rgba(34,197,94,.2); }
    .opt.wrong{ border-color: rgba(239,68,68,.6); background: rgba(239,68,68,.15); box-shadow: 0 0 20px rgba(239,68,68,.2); }
    .opt.locked{cursor:not-allowed; opacity:.95; pointer-events: none;}
    
    .toast{ position:fixed; top:90px; left:50%; transform:translateX(-50%); background: rgba(15,23,48,.9); border:1px solid rgba(110,231,255,.4); border-radius:16px; padding:12px 20px; color:var(--text); opacity:0; transition: .3s ease; z-index:99; pointer-events:none; font-weight: 700; box-shadow: 0 10px 25px rgba(0,0,0,0.5);}
    .toast.show{opacity:1; transform:translateX(-50%) translateY(10px);}
    
    /* شاشة التحميل */
    .loader { text-align: center; color: var(--glow1); font-size: 20px; font-weight: bold; padding: 50px; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
 </head>
 <body>

  <header>
   <div class="headin">
    <div class="brand">
     <div class="premium-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <defs><linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6ee7ff" /><stop offset="100%" stop-color="#a78bfa" /></linearGradient></defs>
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
     </div>
     <div>
      <h1 style="margin-bottom: 4px; font-weight: 900;">Online Exam</h1>
      <p class="sub" style="color: var(--glow1); font-weight: 900; font-family: 'Tajawal', sans-serif; font-size: 14px; text-shadow: 0 0 5px rgba(110,231,255,0.3);">
          اللهم صلِّ وسلم على نبينا محمد ﷺ ❤️
      </p>
     </div>
    </div>
    <div class="pillbar">
     <div class="pill">
      تم الحل: <b id="answered">0</b> / <b id="total">0</b>
     </div>
     <div class="pill">
      النتيجة: <b id="score">0</b>
     </div>
    </div>
   </div>
  </header>

  <div class="wrap" id="kahootContainer">
      <div class="loader">⏳ جاري سحب الأسئلة من الخادم...</div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  const firebaseConfig = {
    apiKey: "AIzaSyD1h3hD3Z6C5hp62ZbFLEtDuA6LMe50ihc",
    authDomain: "pharma-exam-2026.firebaseapp.com",
    databaseURL: "https://pharma-exam-2026-default-rtdb.firebaseio.com",
    projectId: "pharma-exam-2026",
    storageBucket: "pharma-exam-2026.firebasestorage.app",
    messagingSenderId: "687076956495",
    appId: "1:687076956495:web:285781fa362d0d83314d3a"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const medicalDict = {
      "variables": "المتغيرات", "relationships": "العلاقات", "Extraneous variable": "المتغير الدخيل",
      "Dependent variable": "المتغير التابع", "Independent variable": "المتغير المستقل", "Hypothesis": "الفرضية",
      "Reliability": "الموثوقية", "validity": "الصدق", "Quantitative": "كمي", "Qualitative": "نوعي"
  };

  function applyTooltips(text) {
      let result = text;
      for (let key in medicalDict) {
          const regex = new RegExp(`\\b${key}\\b`, 'gi');
          result = result.replace(regex, `<span class="medical-tooltip" data-meaning="${medicalDict[key]}">$&</span>`);
      }
      return result;
  }

  // المصفوفة فاضية، وهتتملي أوتوماتيك من قاعدة البيانات
  let examQuestions = []; 
  let currentQ = 0;
  let state = { answered: 0, score: 0 };
  let timeLeft = 30;
  let timerInterval;

  const container = document.getElementById("kahootContainer");
  const answeredEl = document.getElementById("answered");
  const totalEl = document.getElementById("total");
  const scoreEl = document.getElementById("score");
  const toastEl = document.getElementById("toast");

  function showToast(msg, isSuccess){
    toastEl.innerHTML = msg;
    toastEl.classList.add("show");
    setTimeout(()=>toastEl.classList.remove("show"), 1500);
  }

  function updateHUD(){
    answeredEl.textContent = state.answered;
    scoreEl.textContent = state.score;
    totalEl.textContent = examQuestions.length;
  }

  function renderLiveCard() {
      if (currentQ >= examQuestions.length) {
          container.innerHTML = `
              <div class="card" style="text-align:center; padding: 40px;">
                  <h1 style="font-size: 50px; margin:0 0 20px;">🏆</h1>
                  <h2 style="color:var(--good); font-size: 28px;">انتهى الاختبار!</h2>
                  <p style="font-size: 18px; color:var(--muted);">لقد حصلت على <b style="color:var(--text);">${state.score}</b> من ${examQuestions.length}</p>
                  <button onclick="location.reload()" style="background: linear-gradient(90deg, var(--glow1), var(--glow2)); border: none; padding: 12px 24px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px;">إعادة الاختبار 🔄</button>
              </div>
          `;
          return;
      }

      const item = examQuestions[currentQ];
      const qTextWithTooltips = applyTooltips(item.q);
      
      container.innerHTML = `
        <div class="card" id="qCard">
            <div class="timer-wrap"><div class="timer-bar" id="timerBar"></div></div>
            <div class="qtop">
                <p class="qtext">${qTextWithTooltips}</p>
                <div class="qno">${currentQ + 1}</div>
            </div>
            <div class="opts" id="optsContainer"></div>
        </div>
      `;

      const optsDiv = document.getElementById("optsContainer");
      
      item.options.forEach((optText, oIdx) => {
        const opt = document.createElement("div");
        opt.className = "opt";
        opt.innerHTML = `<div class="badge">${String.fromCharCode(65+oIdx)}</div><div class="txt">${optText}</div>`;
        
        opt.onclick = () => {
            if (optsDiv.classList.contains("locked")) return;
            optsDiv.classList.add("locked");
            clearInterval(timerInterval);
            state.answered++;
            
            if (oIdx === parseInt(item.correct)) {
                opt.classList.add("correct");
                state.score++;
                showToast("✅ ممتاز! إجابة صحيحة");
            } else {
                opt.classList.add("wrong");
                optsDiv.children[item.correct].classList.add("correct");
                showToast("❌ إجابة خاطئة");
            }
            
            optsDiv.querySelectorAll(".opt").forEach(o => o.classList.add("locked"));
            updateHUD();
            
            setTimeout(() => { currentQ++; renderLiveCard(); }, 2000);
        };
        optsDiv.appendChild(opt);
      });

      timeLeft = 30;
      const bar = document.getElementById("timerBar");
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
          timeLeft--;
          let pct = (timeLeft / 30) * 100;
          bar.style.width = pct + '%';
          
          if(timeLeft <= 10) bar.classList.add("danger");
          
          if(timeLeft <= 0) {
              clearInterval(timerInterval);
              optsDiv.classList.add("locked");
              optsDiv.children[item.correct].classList.add("correct");
              optsDiv.querySelectorAll(".opt").forEach(o => o.classList.add("locked"));
              showToast("⏰ انتهى الوقت!");
              state.answered++; updateHUD();
              setTimeout(() => { currentQ++; renderLiveCard(); }, 2000);
          }
      }, 1000);
  }

  // الاتصال بقاعدة البيانات وسحب الأسئلة عند فتح الصفحة
  db.ref('research_questions').once('value', (snap) => {
      if (snap.exists()) {
          snap.forEach(childSnap => {
              examQuestions.push(childSnap.val());
          });
          updateHUD();
          renderLiveCard();
      } else {
          container.innerHTML = "<h2 style='text-align:center; color:#ef4444; margin-top:50px;'>لا توجد أسئلة متاحة حالياً. يرجى إضافة أسئلة من لوحة التحكم.</h2>";
      }
  });

  </script>
 </body>
</html>
