<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>امتحان البحث - منصة اختبارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #05070c;
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .exam-container {
            width: 100%;
            max-width: 700px;
            background-color: #0c1322;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            margin-bottom: 30px;
        }

        .exam-header {
            text-align: center;
            border-bottom: 2px solid #1e293b;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .exam-header h2 {
            color: #06b6d4;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .exam-header p {
            color: #64748b;
            font-size: 14px;
        }

        .question-card {
            background-color: #111827;
            border: 1px solid #1e293b;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .question-title {
            color: #a855f7;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .option-label {
            display: block;
            background-color: #1a2235;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            font-size: 15px;
        }

        .option-label:hover {
            border-color: #06b6d4;
            background-color: rgba(6, 182, 212, 0.05);
        }

        input[type="radio"] {
            margin-left: 12px;
            accent-color: #06b6d4;
            transform: scale(1.2);
        }

        .submit-btn {
            width: 100%;
            background-color: #06b6d4;
            color: #05070c;
            border: none;
            padding: 16px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            display: none; /* مخفي لحد ما الأسئلة تحمل */
        }

        .submit-btn:hover {
            background-color: #0891b2;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
        }

        .result-box {
            display: none;
            text-align: center;
            padding: 25px;
            background-color: rgba(16, 185, 129, 0.1);
            border: 2px solid #10b981;
            border-radius: 15px;
            margin-top: 25px;
            color: #10b981;
            font-size: 22px;
            font-weight: 700;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
            padding-bottom: 20px;
        }

        .footer a {
            text-decoration: none;
            font-weight: bold;
            color: #ec4899;
            margin-left: 4px;
        }
    </style>
</head>
<body>

    <div class="exam-container">
        <div class="exam-header">
            <h2>امتحان البحث العلمي</h2>
            <p>يرجى قراءة الأسئلة بعناية واختيار الإجابة الصحيحة</p>
        </div>

        <div id="loadingText" style="text-align:center; color:#64748b; padding: 20px;">
            جاري تحميل الأسئلة...
        </div>

        <div id="questionsContainer"></div>

        <button class="submit-btn" id="submitBtn" onclick="calculateScore()">تسليم الامتحان</button>
        
        <div id="resultBox" class="result-box"></div>
    </div>

    <div class="footer">
        Created BY <a href="https://wa.me/201016781843" target="_blank">AHMED HAMED</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCeXbJHhHZrVVq-BprbeSAgxLbB7l36Eqg",
            authDomain: "ahmedexams-3e267.firebaseapp.com",
            databaseURL: "https://ahmedexams-3e267-default-rtdb.firebaseio.com", 
            projectId: "ahmedexams-3e267",
            storageBucket: "ahmedexams-3e267.firebasestorage.app",
            messagingSenderId: "151411096023",
            appId: "1:151411096023:web:fcabb7c60c6e433b1bf392"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let globalQuestions = [];

        // دالة لجلب الأسئلة من الفايربيز
        function fetchQuestions() {
            database.ref('exam1_questions').once('value').then((snapshot) => {
                const questionsData = snapshot.val();
                
                // لو مفيش أسئلة في الداتا بيز، هنحط سؤالين تجربة عشان تشوف الشكل
                if (!questionsData) {
                    const dummyData = [
                        { q: "ما هي لغة البرمجة المستخدمة لبناء هيكل صفحات الويب؟", options: ["Python", "HTML", "C++", "Java"], correct: 1 },
                        { q: "أي من التالي يُستخدم لتنسيق شكل الموقع وإعطائه ألوان؟", options: ["CSS", "PHP", "Firebase", "MySQL"], correct: 0 }
                    ];
                    database.ref('exam1_questions').set(dummyData);
                    globalQuestions = dummyData;
                } else {
                    globalQuestions = questionsData;
                }

                renderQuestions();
            });
        }

        // دالة لعرض الأسئلة في الصفحة
        function renderQuestions() {
            document.getElementById('loadingText').style.display = 'none';
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            globalQuestions.forEach((qObj, index) => {
                let optionsHtml = '';
                qObj.options.forEach((opt, optIndex) => {
                    optionsHtml += `
                        <label class="option-label">
                            <input type="radio" name="question_${index}" value="${optIndex}">
                            ${opt}
                        </label>
                    `;
                });

                const questionCard = `
                    <div class="question-card">
                        <div class="question-title">السؤال ${index + 1}: ${qObj.q}</div>
                        <div class="options-container">
                            ${optionsHtml}
                        </div>
                    </div>
                `;
                container.innerHTML += questionCard;
            });

            document.getElementById('submitBtn').style.display = 'block';
        }

        // دالة حساب النتيجة
        function calculateScore() {
            let score = 0;
            let answeredAll = true;

            globalQuestions.forEach((qObj, index) => {
                const selectedOption = document.querySelector(`input[name="question_${index}"]:checked`);
                if (!selectedOption) {
                    answeredAll = false;
                } else if (parseInt(selectedOption.value) === qObj.correct) {
                    score++;
                }
            });

            if (!answeredAll) {
                alert("يرجى الإجابة على جميع الأسئلة قبل التسليم!");
                return;
            }

            // إخفاء الأسئلة والزرار وإظهار النتيجة
            document.getElementById('questionsContainer').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'none';
            
            const resultBox = document.getElementById('resultBox');
            resultBox.style.display = 'block';
            resultBox.innerHTML = `انتهى الامتحان! <br><br> نتيجتك هي: ${score} من ${globalQuestions.length}`;
            
            // التمرير لأعلى الصفحة لرؤية النتيجة
            window.scrollTo(0, 0);
        }

        // تشغيل جلب الأسئلة أول ما الصفحة تحمل
        window.onload = fetchQuestions;
    </script>
</body>
</html>
