<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة اختبارات - HTML_JI</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: radial-gradient(circle at top left, #1e1b4b, #000000, #0f172a); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; color: #ffffff;}
        .main-card { width: 100%; max-width: 400px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 24px; position: relative; overflow: hidden; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5); padding: 28px 24px; display: flex; flex-direction: column; border: 1px solid rgba(255, 255, 255, 0.1); }
        .top-gradient-bar { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, #ec4899, #8b5cf6, #06b6d4); }
        .card-header { text-align: right; direction: rtl; margin-bottom: 25px; margin-top: 5px; }
        .card-header h2 { color: #ffffff; font-size: 24px; font-weight: 800; margin-bottom: 2px; text-shadow: 0 2px 10px rgba(255,255,255,0.1); }
        .card-header h3 { color: #c4b5fd; font-size: 19px; font-weight: 600; margin-bottom: 8px; }
        .card-header p { color: #94a3b8; font-size: 13px; font-weight: 400; }
        .progress-line { width: 100%; height: 1px; background-color: rgba(255,255,255,0.1); margin-bottom: 30px; }
        .page-section { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .login-form { display: flex; flex-direction: column; gap: 20px; direction: rtl; margin-bottom: 40px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { color: #c4b5fd; font-size: 14px; font-weight: 600; padding-right: 4px; }
        .input-group input { background-color: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 14px; padding: 14px 16px; color: #ffffff; font-size: 14px; outline: none; transition: all 0.3s ease; }
        .input-group input:focus { border-color: #8b5cf6; background-color: rgba(0, 0, 0, 0.4); box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }
        .login-btn { background: linear-gradient(90deg, #8b5cf6, #6d28d9); border: none; color: #ffffff; padding: 15px; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; margin-top: 10px; box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3); }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(139, 92, 246, 0.5); filter: brightness(1.1); }
        .content-area { direction: rtl; text-align: right; margin-bottom: 40px; }
        .section-title { color: #ffffff; font-size: 17px; font-weight: 700; margin-bottom: 15px; padding-right: 2px; }
        .exams-list { display: flex; flex-direction: column; gap: 14px; }
        .exam-item { background-color: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px 18px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; transition: all 0.3s ease; }
        .exam-item:hover { background-color: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); transform: scale(1.02); }
        .exam-details { display: flex; flex-direction: column; gap: 6px; }
        .exam-name { color: #ffffff; font-size: 15px; font-weight: 700; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .exam-meta { color: #94a3b8; font-size: 12px; }
        .exam-action { background-color: rgba(139, 92, 246, 0.2); color: #c4b5fd; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; border: 1px solid rgba(139, 92, 246, 0.3); }
        .card-footer { display: flex; justify-content: center; align-items: center; text-align: center; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .author-text { color: #94a3b8; font-size: 14px; font-weight: 500; }
        .author-text a { text-decoration: none; font-weight: bold; color: #f472b6; margin-left: 4px; }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="top-gradient-bar"></div>
        <div class="card-header" id="cardHeader">
            <h2>منصة اختبارات</h2>
            <h3>HTML_JI</h3>
            <p id="headerSubtitle">أهلاً بك، يرجى إدخال بياناتك لتسجيل الدخول</p>
        </div>
        <div class="progress-line"></div>

        <div id="loginSection" class="page-section">
            <div class="login-form">
                <div class="input-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="username" placeholder="أدخل اسم المستخدم..." autocomplete="off">
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="password" placeholder="أدخل كلمة المرور...">
                </div>
                <button class="login-btn" id="loginBtn" onclick="handleLogin()">تسجيل الدخول</button>
            </div>
        </div>

        <div id="examsSection" class="page-section" style="display: none;">
            <div class="content-area">
                <div class="section-title">الامتحانات المتاحة:</div>
                <div class="exams-list" id="dynamicExamsList"></div>
            </div>
        </div>

        <div class="card-footer">
            <div class="author-text">
                Created BY <a href="https://wa.me/201016781843" target="_blank">AHMED HAMED</a>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCeXbJHhHZrVVq-BprbeSAgxLbB7l36Eqg",
            authDomain: "ahmedexams-3e267.firebaseapp.com",
            databaseURL: "https://ahmedexams-3e267-default-rtdb.firebaseio.com", 
            projectId: "ahmedexams-3e267",
            storageBucket: "ahmedexams-3e267.firebasestorage.app",
            messagingSenderId: "151411096023",
            appId: "1:151411096023:web:fcabb7c60c6e433b1bf392"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function handleLogin() {
            const btn = document.getElementById('loginBtn');
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value.trim();

            if(usernameInput === '' || passwordInput === '') { showError(btn, 'يرجى إدخال البيانات!'); return; }

            btn.style.opacity = '0.8'; btn.innerText = 'جاري التحقق...';

            database.ref('credentials').once('value').then((snapshot) => {
                const creds = snapshot.val();
                if (!creds) { showError(btn, 'قاعدة البيانات فارغة!'); return; }
                
                if(usernameInput === String(creds.username) && passwordInput === String(creds.password)) {
                    btn.style.background = '#10b981'; btn.style.boxShadow = '0 8px 20px rgba(16, 185, 129, 0.3)'; btn.innerText = 'تم التحقق!';
                    fetchExamsFromServer();
                } else { showError(btn, 'بيانات غير صحيحة!'); }
            }).catch(() => { showError(btn, 'خطأ في الاتصال!'); });
        }

        function fetchExamsFromServer() {
            database.ref('exams').on('value', (snapshot) => {
                const examsContainer = document.getElementById('dynamicExamsList');
                examsContainer.innerHTML = ''; 
                
                const examsData = snapshot.val();
                
                if (examsData) {
                    Object.keys(examsData).forEach((key) => {
                        const exam = examsData[key];
                        if(exam && exam.name) {
                            const isClosed = exam.status === 'closed';
                            
                            const itemOpenTag = isClosed 
                                ? `<div class="exam-item" style="cursor:not-allowed;" onclick="alert('عذراً، هذا الامتحان مغلق حالياً 🔒')">` 
                                : `<a href="${exam.url || '#'}" class="exam-item">`;
                            const itemCloseTag = isClosed ? `</div>` : `</a>`;
                            
                            const actionBtn = isClosed 
                                ? `<div class="exam-action" style="background-color:rgba(239, 68, 68, 0.2); color:#fca5a5; border-color:rgba(239, 68, 68, 0.3);">مغلق 🔒</div>` 
                                : `<div class="exam-action">دخول</div>`;

                            const examHTML = `
                                ${itemOpenTag}
                                    <div class="exam-details">
                                        <span class="exam-name">${exam.name}</span>
                                        <span class="exam-meta">${exam.questionsCount} سؤال</span>
                                    </div>
                                    ${actionBtn}
                                ${itemCloseTag}
                            `;
                            examsContainer.innerHTML += examHTML;
                        }
                    });
                } else {
                    examsContainer.innerHTML = '<p style="color:#94a3b8; text-align:center; font-size:13px;">لا توجد امتحانات متاحة حالياً.</p>';
                }

                setTimeout(() => {
                    document.getElementById('headerSubtitle').style.display = 'none';
                    document.getElementById('cardHeader').style.marginBottom = '15px';
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('examsSection').style.display = 'block';
                }, 400);
            });
        }

        function showError(button, message) {
            button.style.background = '#ef4444'; button.style.boxShadow = '0 8px 20px rgba(239, 68, 68, 0.3)'; button.innerText = message;
            setTimeout(() => { button.style.background = 'linear-gradient(90deg, #8b5cf6, #6d28d9)'; button.style.boxShadow = '0 8px 20px rgba(139, 92, 246, 0.3)'; button.innerText = 'تسجيل الدخول'; button.style.opacity = '1'; }, 2000);
        }
    </script>
</body>
</html>
