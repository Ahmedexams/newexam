<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#070912">
    <title>منصة الاختبارات</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&family=Tajawal:wght@500;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/UAParser.js/1.0.37/ua-parser.min.js"></script>

    <style>
        :root { --bg0:#070912; --bg1:#0b1020; --stroke:#1a2b55; --text:#e9efff; --muted:#a8b3d9; --good:#22c55e; --bad:#ef4444; --glow1:#6ee7ff; --glow2:#a78bfa; --glow3:#22c55e; --glow4:#fb7185; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(1200px 600px at 80% -10%, rgba(167,139,250,.22), transparent 60%), radial-gradient(1000px 500px at 10% 0%, rgba(110,231,255,.18), transparent 55%), radial-gradient(900px 500px at 50% 120%, rgba(34,197,94,.12), transparent 60%), linear-gradient(180deg, var(--bg0), var(--bg1)); color: var(--text); padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 420px; z-index: 10; display: flex; flex-direction: column; gap: 20px; }
        
        .header { text-align: center; margin-bottom: 10px; }
        .premium-logo { position: relative; width: 85px; height: 85px; margin: 0 auto 20px auto; display: flex; justify-content: center; align-items: center; border-radius: 50%; background: linear-gradient(135deg, #16203a, #0b1020); box-shadow: 0 10px 30px rgba(0,0,0,0.6), inset 0 0 0 2px rgba(255,255,255,0.05); }
        .premium-logo::before, .premium-logo::after { content: ''; position: absolute; inset: -3px; border-radius: 50%; background: conic-gradient(from 0deg, var(--glow1), var(--glow2), var(--glow3), var(--glow1)); z-index: -1; animation: spin 4s linear infinite; }
        .premium-logo::after { filter: blur(12px); opacity: 0.8; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .premium-logo svg { width: 42px; height: 42px; filter: drop-shadow(0 0 8px rgba(110,231,255,0.8)); }
        
        .header h1 { font-size: 28px; font-weight: 900; margin-bottom: 5px; text-shadow: 0 2px 10px rgba(110,231,255,0.3); }
        .header p { color: var(--muted); font-size: 15px; font-weight: 800; }
        
        .card { background: linear-gradient(180deg, rgba(15,23,48,.72), rgba(15,23,48,.45)); border: 1px solid rgba(26,43,85,.85); border-radius: 24px; padding: 30px 20px; box-shadow: 0 12px 30px rgba(0,0,0,.3), inset 0 0 0 1px rgba(110,231,255,.04); position: relative; overflow: hidden; width: 100%; }
        .input-group { margin-bottom: 15px; position: relative; z-index: 2;}
        .input-group input { width: 100%; border-radius: 16px; border: 1px solid rgba(26,43,85,.85); background: rgba(7,9,18,.45); padding: 16px 18px; color: var(--text); font-size: 16px; font-weight: 800; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: rgba(110,231,255,.40); box-shadow: 0 0 15px rgba(110,231,255,.1), inset 0 0 0 1px rgba(110,231,255,.1); }
        .input-group input::placeholder { color: #5a6b9c; font-weight: 500; }
        
        .btn-primary { width: 100%; padding: 16px; border: none; border-radius: 16px; background: linear-gradient(90deg, var(--glow1), var(--glow2)); color: var(--bg0); font-size: 18px; font-weight: 900; cursor: pointer; transition: 0.3s; margin-top: 10px; position: relative; z-index: 2; box-shadow: 0 0 20px rgba(110,231,255,.2); }
        .btn-primary:active { transform: scale(0.97); }
        
        .exams-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; position: relative; z-index: 2;}
        .section-title { font-size: 20px; font-weight: 900; color: var(--text); margin: 0; }
        .logout-btn { background: rgba(239,68,68,.15); color: var(--bad); border: 1px solid rgba(239,68,68,.4); padding: 8px 16px; border-radius: 12px; font-size: 14px; font-weight: 900; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .logout-btn:active { background: rgba(239,68,68,.3); transform: scale(0.95); }
        .exams-list { display: flex; flex-direction: column; gap: 12px; position: relative; z-index: 2;}
        
        .exam-item { border-radius: 16px; border: 1px solid rgba(26,43,85,.85); background: rgba(7,9,18,.35); padding: 18px; display: flex; justify-content: space-between; align-items: center; transition: transform .1s ease, border-color .2s ease, background .2s ease; cursor: pointer; }
        .exam-item:hover, .exam-item:active { transform: translateY(-2px); border-color: rgba(110,231,255,.30); background: rgba(7,9,18,.6);}
        
        .exam-info { display: flex; flex-direction: column; gap: 6px; }
        .exam-name { font-weight: 900; color: var(--text); font-size: 16px; }
        .exam-meta { color: var(--muted); font-size: 13px; font-weight: 800; }
        .exam-status { background: rgba(34,197,94,.15); color: var(--good); border: 1px solid rgba(34,197,94,.4); padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 900; }
        .exam-status.locked { background: rgba(239,68,68,.12); color: var(--bad); border-color: rgba(239,68,68,.4); }
        
        .footer { text-align: center; margin-top: 30px; display: flex; justify-content: center; align-items: center; width: 100%; }
        .glass-box { background: rgba(15,23,48,.65); border: 1px solid rgba(26,43,85,.85); border-radius: 20px; padding: 12px 26px; box-shadow: 0 12px 30px rgba(0,0,0,.3), inset 0 0 0 1px rgba(110,231,255,.05); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); text-decoration: none; transition: 0.3s; display: inline-block; }
        .glass-box:hover { border-color: rgba(110,231,255,.3); transform: translateY(-3px); }
        .neon { font-family: 'Outfit', sans-serif; background: linear-gradient(90deg, var(--glow1), var(--glow2), var(--glow3), var(--glow4), var(--glow1)); background-size: 220% 100%; -webkit-background-clip: text; background-clip:text; color:transparent; animation: flow 4s linear infinite; font-weight: 900; font-size: 15px; letter-spacing: 0.6px; text-transform: uppercase; }
        @keyframes flow { 0% { background-position: 0% 50%; } 100% { background-position: 220% 50%; } }
        
        .fade-in { animation: appFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes appFadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header fade-in">
            <div class="premium-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#6ee7ff" />
                            <stop offset="100%" stop-color="#a78bfa" />
                        </linearGradient>
                    </defs>
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
            </div>
            <h1>منصة الاختبارات</h1>
            <p id="headerSubtitle">أهلاً بك، يرجى تسجيل الدخول للبدء</p>
        </div>

        <div class="card fade-in" style="animation-delay: 0.1s;">
            <div id="loginSection">
                <div class="input-group">
                    <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off" autocorrect="off" autocapitalize="none">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="كلمة المرور">
                </div>
                <button class="btn-primary" id="loginBtn" onclick="handleLogin()">تسجيل الدخول</button>
            </div>

            <div id="examsSection" style="display: none;">
                <div class="exams-header-row">
                    <h2 class="section-title">الاختبارات المتاحة</h2>
                    <button class="logout-btn" onclick="handleLogout()">
                        رجوع
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>
                <div class="exams-list" id="dynamicExamsList"></div>
            </div>
        </div>

        <div class="footer fade-in" id="developerFooter" style="display: none;">
            <a href="https://wa.me/201016781843" target="_blank" class="glass-box">
                <span class="neon">Developed BY Ahmed Hamed</span>
            </a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCeXbJHhHZrVVq-BprbeSAgxLbB7l36Eqg",
            authDomain: "ahmedexams-3e267.firebaseapp.com",
            databaseURL: "https://ahmedexams-3e267-default-rtdb.firebaseio.com", 
            projectId: "ahmedexams-3e267",
            storageBucket: "ahmedexams-3e267.firebasestorage.app",
            messagingSenderId: "151411096023",
            appId: "1:151411096023:web:fcabb7c60c6e433b1bf392"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 🟢 تم تغيير localStorage إلى sessionStorage عشان الدخول يكون إجباري للينك الجديد
        document.addEventListener("DOMContentLoaded", () => {
            if (sessionStorage.getItem('student_auth') === 'verified') {
                fetchExamsFromServer();
            }
        });

        function logDeviceData(username) {
            let deviceStr = "جهاز غير معروف";
            try {
                const parser = new UAParser();
                const result = parser.getResult();
                if (result.device.vendor && result.device.model) {
                    deviceStr = result.device.vendor + " " + result.device.model;
                } else if (result.os.name) {
                    deviceStr = result.os.name + " (" + (result.browser.name || "") + ")";
                }
            } catch(e) {}

            fetch('https://api.db-ip.com/v2/free/self')
              .then(res => res.json())
              .then(data => saveToFirebase(username, deviceStr, data.city + ", " + data.countryName))
              .catch(() => saveToFirebase(username, deviceStr, "غير معروف"));
        }

        function saveToFirebase(username, device, loc) {
            const timeNow = new Date().toLocaleString('ar-EG');
            
            database.ref('login_logs').push({
                username: username,
                device: device,
                location: loc,
                time: timeNow
            });

            const msg = `🟢 طالب جديد سجل دخول!\n👤 الاسم: ${username}\n📱 الجهاز: ${device}\n📍 المكان: ${loc}\n⏰ الوقت: ${timeNow}`;
            const token = "8925620594:AAG45Wd8gS62MI_JAeSPm50aSkLLTxzWW0g";
            const chatId = "8446500978";
            
            fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: chatId, text: msg })
            }).catch(e => console.log(e));
        }

        function handleLogin() {
            const btn = document.getElementById('loginBtn');
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value.trim();

            if(usernameInput === '' || passwordInput === '') { showError(btn, 'يرجى إدخال البيانات!'); return; }

            btn.style.background = 'rgba(26,43,85,.8)'; btn.style.color = '#fff'; btn.innerHTML = 'جاري التحقق...';

            database.ref('credentials').once('value').then((snapshot) => {
                const creds = snapshot.val();
                if (!creds) { showError(btn, 'خطأ في قاعدة البيانات!'); return; }
                
                if(usernameInput === String(creds.username) && passwordInput === String(creds.password)) {
                    btn.style.background = 'rgba(34,197,94,.8)'; btn.style.color = '#fff'; btn.innerHTML = 'تم بنجاح ✓';
                    
                    logDeviceData(usernameInput);

                    // 🟢 الحفظ المؤقت للجلسة فقط
                    sessionStorage.setItem('student_auth', 'verified');
                    sessionStorage.setItem('student_name', usernameInput);
                    
                    history.pushState({page: 'exams'}, 'Exams', '#exams');

                    setTimeout(fetchExamsFromServer, 500);
                } else { 
                    showError(btn, 'البيانات غير صحيحة!'); 
                }
            }).catch(() => { showError(btn, 'لا يوجد اتصال بالإنترنت!'); });
        }

        function fetchExamsFromServer() {
            database.ref('exams').on('value', (snapshot) => {
                const examsContainer = document.getElementById('dynamicExamsList');
                examsContainer.innerHTML = ''; 
                const examsData = snapshot.val();
                
                if (examsData) {
                    Object.keys(examsData).forEach((key) => {
                        const exam = examsData[key];
                        if(exam && exam.name) {
                            const isClosed = exam.status === 'closed';
                            const actionClass = isClosed ? 'locked' : '';
                            const actionText = isClosed ? 'مغلق 🔒' : 'دخول';

                            examsContainer.innerHTML += `
                                <div class="exam-item" onclick="goToExam('${isClosed}', '${exam.url}')">
                                    <div class="exam-info">
                                        <span class="exam-name">${exam.name}</span>
                                        <span class="exam-meta">${exam.questionsCount} سؤال</span>
                                    </div>
                                    <div class="exam-status ${actionClass}">${actionText}</div>
                                </div>`;
                        }
                    });
                } else {
                    examsContainer.innerHTML = '<p style="color:var(--muted); text-align:center; font-size:14px; padding:20px;">لا توجد اختبارات متاحة حالياً.</p>';
                }

                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('headerSubtitle').style.display = 'none';
                document.getElementById('examsSection').style.display = 'block';
                document.getElementById('developerFooter').style.display = 'flex';
            });
        }

        function goToExam(isClosed, url) {
            if (isClosed === 'true' || isClosed === true) {
                alert('عذراً، هذا الاختبار مغلق حالياً 🔒');
            } else {
                const studentName = sessionStorage.getItem('student_name') || 'student_' + Math.floor(Math.random() * 1000);
                const secureToken = Math.random().toString(36).substring(2) + Date.now().toString(36);
                
                database.ref('active_tickets/' + studentName).set({
                    token: secureToken,
                    timestamp: Date.now()
                }).then(() => {
                    const separator = url.includes('?') ? '&' : '?';
                    const secureUrl = `${url}${separator}u=${encodeURIComponent(studentName)}&t=${secureToken}`;
                    window.location.replace(secureUrl);
                }).catch(() => {
                    alert('خطأ في الاتصال بالخادم، يرجى إعادة المحاولة.');
                });
            }
        }

        function showError(button, message) {
            button.style.background = 'rgba(239,68,68,.8)'; button.style.color = '#fff'; button.innerHTML = message;
            setTimeout(() => { 
                button.style.background = 'linear-gradient(90deg, var(--glow1), var(--glow2))'; 
                button.style.color = 'var(--bg0)'; button.innerHTML = 'تسجيل الدخول'; 
            }, 2000);
        }

        function handleLogout() {
            sessionStorage.removeItem('student_auth');
            sessionStorage.removeItem('student_name');
            
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            
            const btn = document.getElementById('loginBtn');
            btn.style.background = 'linear-gradient(90deg, var(--glow1), var(--glow2))';
            btn.style.color = 'var(--bg0)';
            btn.innerHTML = 'تسجيل الدخول';

            document.getElementById('examsSection').style.display = 'none';
            document.getElementById('developerFooter').style.display = 'none';
            document.getElementById('headerSubtitle').style.display = 'block';
            document.getElementById('loginSection').style.display = 'block';

            if (location.hash === '#exams') history.back();
        }

        window.addEventListener('popstate', function(event) {
            if (document.getElementById('examsSection').style.display === 'block') {
                if(sessionStorage.getItem('student_auth') === 'verified') {
                    history.pushState({page: 'exams'}, 'Exams', '#exams');
                } else {
                    handleLogout();
                }
            }
        });
    </script>
</body>
</html>
